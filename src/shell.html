<!DOCTYPE html>
<html lang="en">
<script>
(function () {
  try {
    var k = "iptrace-theme";
    var t = localStorage.getItem(k);
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    if (t === "light") document.documentElement.setAttribute("data-theme", "light");
    else document.documentElement.removeAttribute("data-theme");
  } catch (e) {}
})();
</script>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iptrace — IP Address, Geolocation & Request Headers</title>
  <meta name="description" content="Instantly see your public IP address, geolocation (country, city, region, ASN), Cloudflare edge metadata, and all inbound HTTP request headers." />
  <meta name="keywords" content="IP address lookup, what is my IP, IP geolocation, IP location, ASN lookup, request headers, Cloudflare trace, IP checker, network info" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://iptrace.top/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://iptrace.top/" />
  <meta property="og:title" content="iptrace — IP Address, Geolocation & Request Headers" />
  <meta property="og:description" content="Instantly see your public IP address, geolocation (country, city, region, ASN), Cloudflare edge metadata, and all inbound HTTP request headers." />
  <meta property="og:site_name" content="iptrace" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="iptrace — IP Address, Geolocation & Request Headers" />
  <meta name="twitter:description" content="Instantly see your public IP address, geolocation (country, city, region, ASN), Cloudflare edge metadata, and all inbound HTTP request headers." />

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="iptrace" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    :root {
      --radius: 10px;
      --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, monospace;
      --bg: #09090b;
      --bg-elevated: #111113;
      --border: #27272a;
      --grid: rgba(255, 255, 255, 0.04);
      --text: #fafafa;
      --muted: #a1a1aa;
      --faint: #52525b;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.12);
      --danger-bg: rgba(239, 68, 68, 0.1);
      --danger-border: rgba(239, 68, 68, 0.35);
      --danger: #f87171;
      --table-th-bg: rgba(0, 0, 0, 0.22);
      --skel-mid: #3f3f46;
    }

    html[data-theme="light"] {
      --bg: #f4f4f5;
      --bg-elevated: #ffffff;
      --border: #e4e4e7;
      --grid: rgba(0, 0, 0, 0.055);
      --text: #18181b;
      --muted: #52525b;
      --faint: #71717a;
      --accent: #0369a1;
      --accent-dim: rgba(3, 105, 161, 0.1);
      --danger-bg: rgba(220, 38, 38, 0.08);
      --danger-border: rgba(220, 38, 38, 0.32);
      --danger: #b91c1c;
      --table-th-bg: rgba(0, 0, 0, 0.04);
      --skel-mid: #d4d4d8;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { color-scheme: dark; }
    html[data-theme="light"] { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 3rem;
    }

    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .brand {
      font-weight: 600;
      letter-spacing: -0.02em;
      font-size: 1rem;
      color: var(--muted);
    }
    .brand span { color: var(--text); }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    button.ghost {
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--muted);
      cursor: pointer;
    }
    button.ghost:hover {
      color: var(--text);
      border-color: var(--faint);
    }
    button.ghost:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .err {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 0.875rem;
    }
    .err[data-visible] { display: block; }

    .hero {
      border-radius: calc(var(--radius) + 2px);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      padding: 1.75rem 1.5rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.55;
    }

    .hero-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--faint);
      margin-bottom: 0.5rem;
    }
    .hero-label.hero-follow {
      margin-top: 1rem;
    }

    .ip-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1rem;
    }

    .ip-value {
      font-family: var(--font-mono);
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
      word-break: break-all;
      line-height: 1.2;
    }
    .ip-value.loading {
      color: var(--faint);
      font-weight: 500;
      font-size: 1.5rem;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    button.primary {
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.5rem 0.9rem;
      border-radius: 6px;
      border: none;
      background: var(--accent-dim);
      color: var(--accent);
      cursor: pointer;
    }
    button.primary:hover { filter: brightness(1.15); }
    button.primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      font-size: 0.75rem;
      color: var(--faint);
      align-self: center;
      min-height: 1em;
    }
    .toast[data-state="ok"] { color: var(--accent); }

    section.card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .card-head {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
    }

    .card-body { padding: 0.75rem 1rem 1rem; }

    dl.grid {
      display: grid;
      grid-template-columns: minmax(7rem, 32%) 1fr;
      gap: 0.35rem 1rem;
      margin: 0;
      font-size: 0.875rem;
    }
    @media (max-width: 520px) {
      dl.grid { grid-template-columns: 1fr; gap: 0.15rem 0; }
      dl.grid dt { margin-top: 0.65rem; color: var(--faint); font-size: 0.75rem; }
      dl.grid dt:first-child { margin-top: 0; }
    }

    dl.grid dt {
      margin: 0;
      color: var(--muted);
      font-weight: 500;
    }
    dl.grid dd {
      margin: 0;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--text);
      word-break: break-word;
    }

    .empty-loc {
      color: var(--muted);
      font-size: 0.875rem;
      margin: 0;
      line-height: 1.55;
    }

    details.headers-details {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      margin-bottom: 1rem;
    }

    details.headers-details summary {
      list-style: none;
      cursor: pointer;
      padding: 0.875rem 1rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      user-select: none;
    }
    details.headers-details summary::-webkit-details-marker { display: none; }
    details.headers-details summary::after {
      content: "";
      width: 0.5rem;
      height: 0.5rem;
      border-right: 1.5px solid var(--faint);
      border-bottom: 1.5px solid var(--faint);
      transform: rotate(45deg);
      transition: transform 0.12s ease;
      flex-shrink: 0;
    }
    details.headers-details[open] summary::after {
      transform: rotate(-135deg);
      margin-top: 0.2rem;
    }
    details.headers-details summary:hover { color: var(--text); }

    .hdr-count {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--faint);
      font-weight: 400;
    }

    .table-wrap {
      border-top: 1px solid var(--border);
      overflow-x: auto;
      max-height: min(60vh, 28rem);
      overflow-y: auto;
    }

    table.hdr {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }
    table.hdr th, table.hdr td {
      text-align: left;
      padding: 0.45rem 1rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }
    table.hdr th {
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
      width: 1%;
      border-right: 1px solid var(--border);
      background: var(--table-th-bg);
    }
    table.hdr td {
      color: var(--muted);
      word-break: break-all;
    }
    table.hdr tr:last-child th,
    table.hdr tr:last-child td { border-bottom: none; }

    .skel {
      display: inline-block;
      height: 1em;
      min-width: 8rem;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--border) 25%, var(--skel-mid) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: skel 1.1s ease-in-out infinite;
    }
    @keyframes skel {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--faint);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><span>ip</span>trace</div>
      <div class="toolbar">
        <button type="button" class="ghost" id="btn-theme" aria-pressed="false" title="Toggle light or dark appearance">Dark</button>
        <button type="button" class="ghost" id="btn-refresh" title="Reload trace data">Refresh</button>
      </div>
    </header>

    <div class="err" id="err" role="alert"></div>

    <section class="hero" aria-labelledby="ip-label as-org-label">
      <div class="hero-label" id="ip-label">Public IP</div>
      <div class="ip-row">
        <div class="ip-value loading" id="ip-display"><span class="skel">&nbsp;</span></div>
      </div>
      <div class="hero-label hero-follow" id="as-org-label">AS organization</div>
      <div class="ip-row">
        <div class="ip-value loading" id="as-org-display"><span class="skel">&nbsp;</span></div>
      </div>
      <div class="actions">
        <button type="button" class="primary" id="btn-copy" disabled>Copy address</button>
        <span class="toast" id="copy-toast" aria-live="polite"></span>
      </div>
    </section>

    <section class="card" aria-labelledby="loc-label">
      <div class="card-head" id="loc-label">Location &amp; edge</div>
      <div class="card-body" id="loc-body">
        <p class="empty-loc">Loading…</p>
      </div>
    </section>

    <details class="headers-details" id="hdr-details">
      <summary>
        Request headers
        <span class="hdr-count" id="hdr-count"></span>
      </summary>
      <div class="table-wrap">
        <table class="hdr" id="hdr-table" aria-label="HTTP request headers">
          <tbody></tbody>
        </table>
      </div>
    </details>

    <footer>
      Headers and geo reflect this request to Cloudflare Workers · <code style="font-size:0.85em">GET /api</code> for JSON
    </footer>
  </div>

  <script>
    (function () {
      var LABELS = {
        colo: "Data center",
        country: "Country",
        city: "City",
        region: "Region",
        regionCode: "Region code",
        postalCode: "Postal code",
        timezone: "Timezone",
        latitude: "Latitude",
        longitude: "Longitude",
        continent: "Continent",
        metroCode: "Metro (DMA)",
        isEUCountry: "EU traffic",
        asn: "ASN",
        asOrganization: "AS organization",
        httpProtocol: "HTTP",
        tlsVersion: "TLS",
        tlsCipher: "TLS cipher",
        clientAcceptEncoding: "Original Accept-Encoding",
        clientTcpRtt: "TCP RTT (ms)",
        edgeRequestKeepAliveStatus: "Edge keepalive status",
        requestPriority: "HTTP priority",
        tlsClientRandom: "TLS client random",
        tlsClientHelloLength: "TLS ClientHello length",
        tlsClientExtensionsSha1: "TLS client extensions (SHA-1, BE)",
        tlsClientExtensionsSha1Le: "TLS client extensions (SHA-1, LE)",
        tlsClientCiphersSha1: "TLS client ciphers (SHA-1)",
      };

      var ORDER = [
        "country", "city", "region", "regionCode", "timezone", "continent",
        "postalCode", "latitude", "longitude", "colo",
        "asn", "asOrganization", "httpProtocol", "tlsVersion", "tlsCipher",
        "clientTcpRtt", "edgeRequestKeepAliveStatus", "requestPriority",
        "clientAcceptEncoding",
        "tlsClientRandom", "tlsClientHelloLength", "tlsClientCiphersSha1",
        "tlsClientExtensionsSha1", "tlsClientExtensionsSha1Le",
        "metroCode", "isEUCountry",
      ];

      var ipEl = document.getElementById("ip-display");
      var asOrgEl = document.getElementById("as-org-display");
      var locBody = document.getElementById("loc-body");
      var hdrTable = document.querySelector("#hdr-table tbody");
      var hdrCount = document.getElementById("hdr-count");
      var hdrDetails = document.getElementById("hdr-details");
      var errEl = document.getElementById("err");
      var btnCopy = document.getElementById("btn-copy");
      var btnRefresh = document.getElementById("btn-refresh");
      var btnTheme = document.getElementById("btn-theme");
      var copyToast = document.getElementById("copy-toast");

      var THEME_KEY = "iptrace-theme";

      function isLightMode() {
        return document.documentElement.getAttribute("data-theme") === "light";
      }

      function applyTheme(light, persist) {
        if (light) document.documentElement.setAttribute("data-theme", "light");
        else document.documentElement.removeAttribute("data-theme");
        if (persist !== false) {
          try {
            localStorage.setItem(THEME_KEY, light ? "light" : "dark");
          } catch (e) {}
        }
        syncThemeButton();
      }

      function syncThemeButton() {
        var light = isLightMode();
        btnTheme.setAttribute("aria-pressed", light ? "true" : "false");
        btnTheme.textContent = light ? "Dark" : "Light";
        btnTheme.title = light ? "Switch to dark mode" : "Switch to light mode";
      }

      syncThemeButton();

      btnTheme.addEventListener("click", function () {
        applyTheme(!isLightMode(), true);
      });

      try {
        window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", function (ev) {
          if (localStorage.getItem(THEME_KEY)) return;
          applyTheme(ev.matches, false);
        });
      } catch (e) {}

      window.addEventListener("storage", function (ev) {
        if (ev.key !== THEME_KEY || ev.newValue == null) return;
        if (ev.newValue === "light") document.documentElement.setAttribute("data-theme", "light");
        else document.documentElement.removeAttribute("data-theme");
        syncThemeButton();
      });

      function orderedKeys(obj) {
        var keys = Object.keys(obj);
        var seen = {};
        var out = [];
        ORDER.forEach(function (k) {
          if (keys.indexOf(k) !== -1) {
            out.push(k);
            seen[k] = true;
          }
        });
        keys.sort().forEach(function (k) {
          if (!seen[k]) out.push(k);
        });
        return out;
      }

      function setError(msg) {
        if (!msg) {
          errEl.removeAttribute("data-visible");
          errEl.textContent = "";
          return;
        }
        errEl.textContent = msg;
        errEl.setAttribute("data-visible", "");
      }

      function setLoading() {
        setError("");
        ipEl.classList.add("loading");
        ipEl.innerHTML = '<span class="skel">&nbsp;</span>';
        asOrgEl.classList.add("loading");
        asOrgEl.innerHTML = '<span class="skel">&nbsp;</span>';
        btnCopy.disabled = true;
        locBody.innerHTML = '<p class="empty-loc">Loading…</p>';
        hdrTable.innerHTML = "";
        hdrCount.textContent = "";
      }

      function renderLocation(loc) {
        if (!loc || !Object.keys(loc).length) {
          locBody.innerHTML =
            '<p class="empty-loc">No edge geo on this request. Deploy on Cloudflare to populate <code>request.cf</code> metadata (country, city, colo, TLS, …).</p>';
          return;
        }
        var keys = orderedKeys(loc);
        var dl = document.createElement("dl");
        dl.className = "grid";
        keys.forEach(function (k) {
          if (k === "asOrganization") return;
          var dt = document.createElement("dt");
          dt.textContent = LABELS[k] || k;
          var dd = document.createElement("dd");
          dd.textContent = String(loc[k]);
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        if (!dl.children.length) {
          locBody.innerHTML =
            '<p class="empty-loc">No edge geo on this request. Deploy on Cloudflare to populate <code>request.cf</code> metadata (country, city, colo, TLS, …).</p>';
          return;
        }
        locBody.innerHTML = "";
        locBody.appendChild(dl);
      }

      function renderHeaders(headers) {
        var names = Object.keys(headers).sort(function (a, b) {
          return a.toLowerCase().localeCompare(b.toLowerCase());
        });
        hdrCount.textContent = "(" + names.length + ")";
        names.forEach(function (name) {
          var tr = document.createElement("tr");
          var th = document.createElement("th");
          th.textContent = name;
          var td = document.createElement("td");
          td.textContent = headers[name];
          tr.appendChild(th);
          tr.appendChild(td);
          hdrTable.appendChild(tr);
        });
      }

      function load() {
        setLoading();
        fetch("/api", { headers: { Accept: "application/json" } })
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            ipEl.classList.remove("loading");
            ipEl.textContent = data.ip || "unknown";
            btnCopy.disabled = !data.ip || data.ip === "unknown";
            asOrgEl.classList.remove("loading");
            var org =
              data.location && data.location.asOrganization != null
                ? String(data.location.asOrganization).trim()
                : "";
            asOrgEl.textContent = org || "—";
            renderLocation(data.location);
            hdrTable.innerHTML = "";
            renderHeaders(data.headers || {});
            hdrDetails.open = false;
          })
          .catch(function (e) {
            ipEl.classList.remove("loading");
            ipEl.textContent = "—";
            asOrgEl.classList.remove("loading");
            asOrgEl.textContent = "—";
            btnCopy.disabled = true;
            locBody.innerHTML =
              '<p class="empty-loc">Could not load trace data.</p>';
            hdrTable.innerHTML = "";
            hdrCount.textContent = "";
            setError(e && e.message ? e.message : "Network error");
          });
      }

      btnRefresh.addEventListener("click", load);

      btnCopy.addEventListener("click", function () {
        var ip = ipEl.textContent;
        if (!ip || ip === "—") return;
        function done(ok) {
          copyToast.textContent = ok ? "Copied" : "Copy failed";
          copyToast.dataset.state = ok ? "ok" : "";
          setTimeout(function () {
            copyToast.textContent = "";
            copyToast.removeAttribute("data-state");
          }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(ip).then(function () { done(true); }).catch(function () { done(false); });
        } else {
          done(false);
        }
      });

      load();
    })();
  </script>
</body>
</html>
